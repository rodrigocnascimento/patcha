name: Sync Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs-mintlify/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patcha
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: rodrigocnascimento/docs
          path: docs
          token: ${{ secrets.DOCS_REPO_TOKEN }}

      - name: Copy docs to docs-repo
        run: |
          rm -rf docs/*
          cp -r docs-mintlify/* docs/

      - name: Commit and push
        working-directory: docs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: sync from patcha $(git log -1 --format=%h)"
          git push
